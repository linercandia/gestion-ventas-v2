<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Finalizada | Rellenos Sabrosos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #4361ee;
            --success-color: #06d6a0;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }
        
        body {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        
        .success-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.08),
                0 1px 3px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .success-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(to right, #4361ee, #06d6a0);
        }
        
        .success-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #06d6a0, #10b981);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 38px;
            box-shadow: 0 10px 20px rgba(6, 214, 160, 0.25);
            animation: gentleBounce 2s ease-in-out infinite;
        }
        
        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        h2 {
            color: var(--dark-color);
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 2.2rem;
        }
        
        .success-message {
            color: #495057;
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        

        .checkmarks {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0;
            text-align: center;
            align-items: center;
        }
        
        .check-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #495057;
            font-size: 0.95rem;
            justify-content: center;
        }
        
        .check-icon {
            color: #06d6a0;
            font-size: 1.2rem;
        }
        
        .sync-notice {
            background: #e7f8f4;
            border: 1px solid #b6f0e1;
            border-radius: 12px;
            padding: 15px;
            margin: 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #0d9488;
        }
        
        .sync-notice i {
            animation: spin 4s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn-close-window {
            background: linear-gradient(to right, #4361ee, #3a56d4);
            border: none;
            border-radius: 12px;
            padding: 16px 30px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.2);
            width: 100%;
            margin-top: 20px;
        }
        
        .btn-close-window:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.3);
            color: white;
            text-decoration: none;
        }
        
        .footer-note {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            font-size: 0.9rem;
            color: #6c757d;
            text-align: center;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--success-color);
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
        }
        
        @media (max-width: 576px) {
            .success-card {
                padding: 40px 25px;
            }
            
            h2 {
                font-size: 1.8rem;
            }
            
            .btn-close-window {
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Solo la tarjeta de éxito, sin header duplicado -->
    <div class="success-card">
        <!-- Icono animado -->
        <div class="success-icon">
            <i class="bi bi-check-circle"></i>
        </div>
        
        <!-- Título principal -->
        <h2>¡Jornada Completada!</h2>
        
        <!-- Mensaje de confirmación -->
        <p class="success-message">
            La jornada ha sido cerrada exitosamente. Gracias por tu colaboración.
        </p>     
        
        <!-- Notificación de sincronización -->
        <div class="sync-notice">
            <i class="bi bi-cloud-check"></i>
            <span>Datos sincronizados correctamente</span>
        </div>
        
        <!-- Único botón para cerrar ventana -->
        <a href="#" class="btn-close-window" onclick="window.close(); return false;">
            <i class="bi bi-door-closed"></i>
            Cerrar Ventana
        </a>
        
        <!-- Nota de pie -->
        <div class="footer-note">
            <i class="bi bi-shield-check text-success me-1"></i>
            Embutidos R&R
        </div>
    </div>

    <script>
        // Efecto simple de confetti al cargar
        document.addEventListener('DOMContentLoaded', function() {
            // Crear algunos elementos de confetti simples
            const colors = ['#4361ee', '#06d6a0', '#ffd166'];
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.width = Math.random() * 8 + 4 + 'px';
                    confetti.style.height = confetti.style.width;
                    
                    document.querySelector('.success-card').appendChild(confetti);
                    
                    // Animación
                    confetti.animate([
                        { 
                            opacity: 0, 
                            transform: 'translateY(0) rotate(0deg)' 
                        },
                        { 
                            opacity: 1, 
                            offset: 0.1 
                        },
                        { 
                            opacity: 1 
                        },
                        { 
                            opacity: 0, 
                            transform: `translateY(${window.innerHeight}px) rotate(${Math.random() * 360}deg)` 
                        }
                    ], {
                        duration: 1500 + Math.random() * 1000,
                        easing: 'cubic-bezier(0.215, 0.61, 0.355, 1)'
                    }).onfinish = () => confetti.remove();
                }, i * 100);
            }
            
            // Efecto sutil en el botón
            const btn = document.querySelector('.btn-close-window');
            btn.addEventListener('click', function(e) {
                // Pequeño efecto visual
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
    </script>
</body>
</html>
